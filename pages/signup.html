<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Axos Bank Finance Portal</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/form-validation.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Axos Finance Portal</h1>
            <h2>Create Account</h2>
            
            <form id="signupForm" class="auth-form" method="POST" action="#" data-validate>
                <div class="form-group">
                    <label for="fullName">Full Name <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName" 
                        required
                        data-validation="required|min"
                        data-min="2"
                        aria-required="true"
                        placeholder="John Doe"
                    >
                </div>

                <div class="form-group">
                    <label for="company">Company Name <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="company" 
                        name="company" 
                        required
                        data-validation="required"
                        aria-required="true"
                        placeholder="Your Company"
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                        data-validation="required|email"
                        aria-required="true"
                        placeholder="your@email.com"
                    >
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        data-validation="phone"
                        placeholder="(555) 123-4567"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required
                        data-validation="required|password"
                        aria-required="true"
                        placeholder="Enter strong password"
                    >
                    <span class="help-text">Must contain uppercase, lowercase, number, and special character</span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        required
                        data-validation="required"
                        aria-required="true"
                        placeholder="Confirm password"
                    >
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
                </div>

                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>

            <div class="auth-links">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="../js/form-validation.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
