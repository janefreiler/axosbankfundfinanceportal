<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Axos Bank Finance Portal</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/form-validation.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Axos Finance Portal</h1>
            <h2>Reset Password</h2>
            
            <form id="forgotPasswordForm" class="auth-form" method="POST" action="#" data-validate>
                <p class="form-description">Enter your email address and we'll send you instructions to reset your password.</p>
                
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                        data-validation="required|email"
                        aria-required="true"
                        placeholder="your@email.com"
                    >
                </div>

                <button type="submit" class="btn btn-primary">Send Reset Link</button>
            </form>

            <div class="auth-links">
                <p><a href="login.html">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script src="../js/form-validation.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
