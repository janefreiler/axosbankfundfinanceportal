<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Axos Bank Finance Portal</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar" role="navigation" aria-label="Main">
            <div class="nav-brand">
                <h1>Axos Finance Portal</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="../index.html">Dashboard</a></li>
                <li><a href="deals.html">My Deals</a></li>
                <li><a href="documents.html">Documents</a></li>
                <li><a href="messages.html">Messages</a></li>
                <li><a href="settings.html" class="active">Settings</a></li>
                <li><a href="login.html" class="logout-btn">Logout</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main role="main">
            <section class="content-header">
                <h2>Settings</h2>
                <p>Manage your account and preferences</p>
            </section>

            <section class="settings-container">
                <div class="settings-tabs">
                    <button class="tab-button active" data-tab="profile">Profile</button>
                    <button class="tab-button" data-tab="security">Security</button>
                    <button class="tab-button" data-tab="notifications">Notifications</button>
                </div>

                <div id="profile" class="tab-content active">
                    <h3>Profile Settings</h3>
                    <form id="profileForm">
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" name="fullName" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </form>
                </div>

                <div id="security" class="tab-content" style="display:none;">
                    <h3>Security Settings</h3>
                    <form id="securityForm">
                        <div class="form-group">
                            <label for="currentPassword">Current Password</label>
                            <input type="password" id="currentPassword" name="currentPassword" required>
                        </div>
                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" name="newPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Update Password</button>
                    </form>
                </div>

                <div id="notifications" class="tab-content" style="display:none;">
                    <h3>Notification Preferences</h3>
                    <form id="notificationsForm">
                        <div class="form-group checkbox">
                            <input type="checkbox" id="emailNotifications" name="emailNotifications" checked>
                            <label for="emailNotifications">Email Notifications</label>
                        </div>
                        <div class="form-group checkbox">
                            <input type="checkbox" id="smsNotifications" name="smsNotifications" checked>
                            <label for="smsNotifications">SMS Notifications</label>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Preferences</button>
                    </form>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Axos Bank Finance Portal. All rights reserved.</p>
        </footer>
    </div>

    <script src="../js/settings.js"></script>
</body>
</html>
